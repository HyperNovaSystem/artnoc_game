<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Artnoc — Contra-Style Action</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: #000;
      color: #ccc;
      font-family: 'Courier New', monospace;
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 100vh;
      padding: 20px;
      overflow: hidden;
    }

    h1 {
      font-size: 1.4rem;
      color: #FF4444;
      margin-bottom: 4px;
      text-transform: uppercase;
      letter-spacing: 4px;
    }

    .subtitle {
      font-size: 0.75rem;
      color: #666;
      margin-bottom: 12px;
    }

    #game {
      border: 2px solid #333;
      border-radius: 2px;
      image-rendering: pixelated;
      background: #000;
    }

    .controls {
      margin-top: 12px;
      font-size: 0.75rem;
      color: #555;
      text-align: center;
      line-height: 1.8;
    }

    .controls kbd {
      background: #1a1a1a;
      border: 1px solid #444;
      border-radius: 3px;
      padding: 1px 5px;
      font-family: inherit;
      color: #aaa;
    }
  </style>
</head>
<body>
  <h1>Artnoc</h1>
  <p class="subtitle">Built with the HyperNova ECS Engine</p>
  <canvas id="game" width="768" height="432"></canvas>
  <div class="controls">
    <kbd>Arrow Keys</kbd> Move / Aim &nbsp;|&nbsp;
    <kbd>Z</kbd> Jump &nbsp;|&nbsp;
    <kbd>X</kbd> Shoot &nbsp;|&nbsp;
    <kbd>Down</kbd> Prone &nbsp;|&nbsp;
    <kbd>Enter</kbd> Start
  </div>
  <script type="module" src="./src/main.ts"></script>
</body>
</html>
